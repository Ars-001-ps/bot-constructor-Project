<!DOCTYPE html>
<html>
<head>
    <title>Чат-бот</title>
</head>
<body>
    <h1>Чат-бот</h1>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="message" placeholder="Введите сообщение..." required>
        <button type="submit">Отправить</button>
    </form>
    {% if bot_response %}
        <h2>Ответ бота:</h2>
        <p>{{ bot_response }}</p>
    {% endif %}
</body>
</html>
